# ================================================================
# FedRAMP-Lite Mock Control Catalog — AC (Access Control) Family
# Based on FedRAMP 20x control families (simplified for demo only)
# NOT official FedRAMP documentation
# ================================================================

controls:

  - id: AC-2
    name: Account Management
    family: Access Control
    description: >
      The organization manages system accounts including identifying account
      types, establishing conditions for membership, and disabling accounts
      that are no longer required. Inactive accounts must be disabled within
      90 days and all accounts must have a defined role.
    evidence_file: users.json
    rules:
      - field: accounts
        checks:
          - type: no_inactive_over_days
            days: 90
            status_field: last_login_days_ago
            flag_field: active
            description: "No inactive accounts beyond 90-day threshold"
          - type: all_have_field
            field: role
            description: "All accounts must have an assigned role"

  - id: AC-3
    name: Access Enforcement
    family: Access Control
    description: >
      The system enforces approved authorizations for logical access to
      information and system resources. All accounts must have a defined
      role and privileged accounts must have access reviews completed.
    evidence_file: users.json
    rules:
      - field: accounts
        checks:
          - type: all_have_field
            field: role
            description: "All accounts must have a role assigned"
          - type: privileged_accounts_reviewed
            description: "All privileged accounts must have access_reviewed = true"

  - id: AC-5
    name: Separation of Duties
    family: Access Control
    description: >
      The organization separates duties of individuals to reduce risk of
      malevolent activity. Validates that not all accounts are admins —
      at least one non-privileged account must exist.
    evidence_file: users.json
    rules:
      - field: accounts
        checks:
          - type: not_all_privileged
            description: "Not all accounts should be privileged/admin"

  - id: AC-6
    name: Least Privilege
    family: Access Control
    description: >
      The organization employs the principle of least privilege. Privileged
      accounts must have MFA enabled. No inactive accounts should retain
      privileged access.
    evidence_file: users.json
    rules:
      - field: accounts
        checks:
          - type: privileged_require_mfa
            description: "All privileged accounts must have MFA enabled"
          - type: no_inactive_privileged
            flag_field: active
            description: "No inactive accounts should have privileged access"

  - id: AC-11
    name: Session Lock - Password Age
    family: Access Control
    description: >
      The organization enforces credential hygiene. Passwords must not
      exceed 90 days of age for active accounts.
    evidence_file: users.json
    rules:
      - field: accounts
        checks:
          - type: password_age_within_limit
            max_days: 90
            flag_field: active
            description: "Active accounts must have passwords rotated within 90 days"

  - id: IA-2
    name: Identification and Authentication - MFA
    family: Identification and Authentication
    description: >
      The information system uniquely identifies and authenticates users.
      All active accounts must have multi-factor authentication enabled.
      This is a core FedRAMP 20x requirement.
    evidence_file: users.json
    rules:
      - field: accounts
        checks:
          - type: all_active_have_mfa
            flag_field: active
            mfa_field: mfa_enabled
            description: "All active accounts must have MFA enabled"

  # ================================================================
  # SC - System and Communications Protection (Firewall)
  # ================================================================

  - id: SC-5
    name: Denial of Service Protection
    family: System and Communications Protection
    description: >
      The system protects against denial-of-service attacks. A default
      deny-all rule must be in place on inbound interfaces and insecure
      ports such as Telnet (23), FTP (21), and TFTP (69) must be blocked.
    evidence_file: firewall.json
    rules:
      - field: deny_all_default
        checks:
          - type: equals
            value: true
            description: "Default deny-all rule must be enabled"
      - field: forbidden_ports_open
        checks:
          - type: list_is_empty
            description: "Insecure ports (Telnet/FTP/TFTP) must not be open"

  - id: SC-7
    name: Boundary Protection
    family: System and Communications Protection
    description: >
      The system monitors and controls communications at external boundaries.
      Telnet must be disabled, HTTP server must be disabled in favour of HTTPS,
      and inbound ACLs must be applied on the WAN interface.
    evidence_file: firewall.json
    rules:
      - field: telnet_enabled
        checks:
          - type: equals
            value: false
            description: "Telnet must be disabled on the device"
      - field: http_server_enabled
        checks:
          - type: equals
            value: false
            description: "Plaintext HTTP server must be disabled"
      - field: https_server_enabled
        checks:
          - type: equals
            value: true
            description: "HTTPS server must be enabled"
      - field: access_control_lists
        checks:
          - type: has_inbound_acl_on_wan
            description: "At least one inbound ACL must be applied on the WAN interface"

  - id: SC-8
    name: Transmission Confidentiality
    family: System and Communications Protection
    description: >
      Remote management sessions must use encrypted protocols only.
      SSH must be enabled and the management protocol must not be Telnet.
    evidence_file: firewall.json
    rules:
      - field: ssh_enabled
        checks:
          - type: equals
            value: true
            description: "SSH must be enabled for encrypted management access"
      - field: management_protocol
        checks:
          - type: not_equals
            value: "Telnet"
            description: "Management protocol must not be Telnet"
      - field: remote_management_encrypted
        checks:
          - type: equals
            value: true
            description: "Remote management must be encrypted"

  # ================================================================
  # CM - Configuration Management (Firewall)
  # ================================================================

  - id: CM-2
    name: Baseline Configuration
    family: Configuration Management
    description: >
      The organization maintains a documented baseline configuration.
      A baseline must exist, config backups must be enabled, and all
      configuration changes must be tracked with a change ticket.
    evidence_file: firewall.json
    rules:
      - field: baseline_config_documented
        checks:
          - type: equals
            value: true
            description: "A documented baseline configuration must exist"
      - field: config_backup_enabled
        checks:
          - type: equals
            value: true
            description: "Automated configuration backups must be enabled"
      - field: config_change_ticket
        checks:
          - type: field_not_empty
            description: "Last config change must reference a change ticket"

  - id: CM-6
    name: Configuration Settings
    family: Configuration Management
    description: >
      The organization establishes and documents configuration settings.
      Default credentials must be changed, SNMP must not use v2c with
      default community strings, NTP must be authenticated, and firmware
      must meet the minimum required version.
    evidence_file: firewall.json
    rules:
      - field: default_credentials_changed
        checks:
          - type: equals
            value: true
            description: "Default device credentials must be changed"
      - field: snmp
        checks:
          - type: snmp_not_default
            description: "SNMP must not use v2c with default community string 'public'"
      - field: ntp
        checks:
          - type: ntp_authenticated
            description: "NTP must use authentication"
      - field: firmware_version
        checks:
          - type: version_gte
            value: "17.3.2"
            description: "Firmware must meet minimum required version 17.3.2"